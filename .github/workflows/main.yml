name: TPChat CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: false

jobs:
  # ============================================
  # SUPPLY CHAIN SECURITY
  # ============================================
  
  supply-chain-check:
    name: Supply Chain Security
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify package-lock.json exists
        run: |
          if [ ! -f package-lock.json ]; then
            echo "ERROR: package-lock.json is required for reproducible builds"
            exit 1
          fi
          echo "✓ package-lock.json verified"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Clean install dependencies
        run: npm ci

      - name: Verify lock file unchanged
        run: |
          if [ -n "$(git status --porcelain package-lock.json)" ]; then
            echo "ERROR: package-lock.json was modified during install"
            exit 1
          fi
          echo "✓ Lock file integrity verified"

      - name: Run npm audit
        run: |
          npm audit --audit-level=high || {
            echo "ERROR: High severity vulnerabilities found"
            exit 1
          }
          echo "✓ No high severity vulnerabilities"

  # ============================================
  # TYPE CHECKING
  # ============================================
  
  type-check:
    name: TypeScript Type Check
    runs-on: ubuntu-latest
    needs: supply-chain-check
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run TypeScript type check
        run: npx tsc --noEmit

  # ============================================
  # CRYPTO UNIT TESTS
  # ============================================
  
  crypto-tests:
    name: Cryptographic Unit Tests
    runs-on: ubuntu-latest
    needs: type-check
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run crypto unit tests
        run: npm run test

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: test-results/
          retention-days: 30

  # ============================================
  # BUILD APPLICATION
  # ============================================
  
  build:
    name: Build Application
    runs-on: ubuntu-latest
    needs: [supply-chain-check, type-check, crypto-tests]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build

      - name: Generate per-module integrity hashes
        id: integrity
        run: |
          # Create integrity.json with hashes of all JS/CSS files
          echo "{\"version\": \"$(cat package.json | jq -r .version)\", \"generatedAt\": \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\", \"algorithm\": \"SHA-256\", \"modules\": {" > dist/integrity.json
          
          FIRST=true
          for file in $(find dist/assets -name "*.js" -o -name "*.css" | sort); do
            HASH=$(sha256sum "$file" | cut -d' ' -f1)
            FILENAME=$(basename "$file")
            if [ "$FIRST" = true ]; then
              FIRST=false
            else
              echo "," >> dist/integrity.json
            fi
            echo "  \"/assets/$FILENAME\": \"$HASH\"" >> dist/integrity.json
          done
          
          echo "}}" >> dist/integrity.json
          
          echo "Generated integrity.json:"
          cat dist/integrity.json

      - name: Generate bundle hash
        id: hash
        run: |
          HASH=$(find dist/assets -type f \( -name "*.js" -o -name "*.css" \) -exec sha256sum {} \; | sha256sum | cut -d' ' -f1)
          echo "BUNDLE_HASH=$HASH" >> $GITHUB_OUTPUT
          echo "Generated bundle hash: $HASH"

      - name: Inject hash into HTML
        run: |
          HASH=${{ steps.hash.outputs.BUNDLE_HASH }}
          sed -i "s|<head>|<head>\\n  <meta name=\"integrity-hash\" content=\"$HASH\">|" dist/index.html

      - name: Verify integrity.json matches generated hashes
        run: |
          # Verify each hash in integrity.json matches actual file
          FAILED=0
          while IFS= read -r line; do
            if echo "$line" | grep -q '"/' ; then
              FILE=$(echo "$line" | cut -d'"' -f2)
              EXPECTED_HASH=$(echo "$line" | cut -d'"' -f4)
              ACTUAL_HASH=$(sha256sum "dist$FILE" | cut -d' ' -f1)
              
              if [ "$EXPECTED_HASH" != "$ACTUAL_HASH" ]; then
                echo "ERROR: Hash mismatch for $FILE"
                echo "  Expected: $EXPECTED_HASH"
                echo "  Actual:   $ACTUAL_HASH"
                FAILED=1
              fi
            fi
          done < dist/integrity.json
          
          if [ $FAILED -eq 1 ]; then
            echo "ERROR: Integrity verification failed"
            exit 1
          fi
          
          echo "✓ All integrity hashes verified"

      - name: Strip source maps (production)
        run: |
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            find dist -name "*.map" -delete
            echo "✓ Source maps stripped"
          fi

      - name: Upload build artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  # ============================================
  # SECURITY SCAN
  # ============================================
  
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

  # ============================================
  # DEPLOY TO GITHUB PAGES
  # ============================================
  
  deploy:
    name: Deploy to GitHub Pages
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: [build, security-scan]
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  # ============================================
  # POST-DEPLOYMENT VERIFICATION
  # ============================================
  
  verify-deployment:
    name: Verify Deployment
    runs-on: ubuntu-latest
    needs: deploy
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Wait for deployment
        run: sleep 30

      - name: Verify site is accessible
        run: |
          SITE_URL="${{ needs.deploy.outputs.page_url }}"
          echo "Checking $SITE_URL"
          curl -sSf "$SITE_URL" > /dev/null || exit 1
          echo "✓ Site is accessible"

      - name: Verify CSP headers
        run: |
          SITE_URL="${{ needs.deploy.outputs.page_url }}"
          HEADERS=$(curl -sI "$SITE_URL")
          
          # Check for security headers in meta tags (GitHub Pages doesn't support custom headers)
          if curl -s "$SITE_URL" | grep -q "Content-Security-Policy"; then
            echo "✓ CSP meta tag found"
          else
            echo "⚠ CSP meta tag not found"
          fi

      - name: Verify integrity.json accessible
        run: |
          SITE_URL="${{ needs.deploy.outputs.page_url }}"
          if curl -sSf "$SITE_URL/integrity.json" > /dev/null; then
            echo "✓ integrity.json is accessible"
          else
            echo "⚠ integrity.json not accessible"
          fi
